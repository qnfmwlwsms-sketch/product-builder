<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Daily Bible Verse</title>
  <link href='./style.css' rel='stylesheet'>
</head>
<body>
  <div class="theme-switch-wrapper">
    <label class="theme-switch" for="checkbox">
      <input type="checkbox" id="checkbox" />
      <div class="slider round"></div>
    </label>
  </div>
  <h1>Bible Verse Recommendation</h1>
  <div id="verse-container">
    <p id="verse-text">Press the button to receive a word of God.</p>
    <p id="verse-reference"></p>
  </div>
  <button onclick="getRandomVerse()">Get a Verse</button>

  <div id="contact-container">
    <h2>Partnership Inquiry</h2>
    <form action="https://formspree.io/f/mdaylqqe" method="POST">
      <div class="form-group">
        <label for="name">Name</label>
        <input type="text" id="name" name="name" placeholder="Your name" required>
      </div>
      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" name="_replyto" placeholder="Your email" required>
      </div>
      <div class="form-group">
        <label for="message">Message</label>
        <textarea id="message" name="message" rows="4" placeholder="How can we work together?" required></textarea>
      </div>
      <button type="submit" class="submit-btn">Send Inquiry</button>
    </form>
  </div>

  <div id="comments-container">
    <div id="disqus_thread"></div>
    <script>

        var d = document, s = d.createElement('script');

        })();
    </script>
    <noscript>Please enable JavaScript to view the <a href="https://disqus.com/?ref_noscript">comments powered by Disqus.</a></noscript>
  </div>

  <script defer type="text/javascript" src="./main.js"></script>
</body>
</html>
